<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from GitHub Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0c0c0e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            color: #f0ede8;
            overflow: hidden;
        }

        /* animated gradient bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 70% 60% at 20% 20%, rgba(212,255,110,0.07) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(110,159,255,0.05) 0%, transparent 60%);
            animation: shift 8s ease-in-out infinite alternate;
        }
        @keyframes shift {
            from { transform: scale(1) rotate(0deg); }
            to   { transform: scale(1.08) rotate(2deg); }
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 48px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 24px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            max-width: 520px;
            width: 90%;
            animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(212,255,110,0.1);
            border: 1px solid rgba(212,255,110,0.25);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #d4ff6e;
            margin-bottom: 28px;
        }
        .dot { width: 6px; height: 6px; background: #d4ff6e; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(36px, 8vw, 58px);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 span { color: #d4ff6e; }

        p {
            font-size: 13px;
            color: rgba(240,237,232,0.45);
            letter-spacing: 0.04em;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        .url-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 12px;
            color: rgba(240,237,232,0.5);
            letter-spacing: 0.05em;
            word-break: break-all;
        }
        .url-pill strong { color: #6e9fff; }

        footer {
            position: fixed;
            bottom: 28px;
            font-size: 11px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.15);
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge"><span class="dot"></span> GitHub Pages — Live</div>
    <h1>It <span>works.</span></h1>
    <p>Your GitHub Pages deployment is up and running.<br>Replace this file with your real site whenever you're ready.</p>
    <div class="url-pill">📍 Deployed at <strong>username.github.io/repo</strong></div>
</div>

<footer>index.html · GitHub Pages test</footer>

</body>
</html>
